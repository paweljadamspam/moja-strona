<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interaktywne Znaki Solana</title>
<style>
body {margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh}
.container {display:flex;gap:20px;font-size:48px;cursor:pointer}
.qr-container {position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#1e293b;padding:20px;border-radius:16px;display:none;flex-direction:column;align-items:center}
.qr-container button {margin-top:10px;padding:8px 12px;border:none;border-radius:8px;background:#6366f1;color:#fff;cursor:pointer}
.overlay {position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none}
</style>
</head>
<body>

<div class="container" id="chars">???</div>
<div class="overlay" id="overlay"></div>
<div class="qr-container" id="qrBox">
  <canvas id="qrcode"></canvas>
  <button id="copyBtn">Kopiuj adres</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const charsEl = document.getElementById('chars');
const overlay = document.getElementById('overlay');
const qrBox = document.getElementById('qrBox');
const qrCanvas = document.getElementById('qrcode');
const copyBtn = document.getElementById('copyBtn');

const addresses = [
  "BAQL4y1J8hae4UM9asN8a8RtjZsjShG8XXErEFQN9YDu",
  "58NojM9qwc7F38oYQAZwDUkArioCbSburkZTBJqLWQd7",
  "FZK29Xj757Z5qPD78gRm7kiZYqyt6szKrSEwdrxwjmPm"
];
const fourthAddress = "H2YZvBUUTnU8bVFR5soC7YaApAeBV5vEaPisrrtzxEvH";

let backendUrl = "https://interaktywny-znaki.onrender.com/usdc/";
let prevBalances = [0,0,0,0];
let currentChars = ['?','?','?'];

// Pokazuje QR i kopiowanie, tylko dla znaku '?'
function showQR(index) {
  if (currentChars[index] !== '?') return;
  new QRCode(qrCanvas, { text: addresses[index], width: 150, height: 150 });
  copyBtn.onclick = () => navigator.clipboard.writeText(addresses[index]);
  qrBox.style.display = 'flex';
  overlay.style.display = 'block';
}

// Kliknięcie / najechanie
charsEl.addEventListener('click', e => {
  const idx = Math.floor(e.offsetX / (charsEl.offsetWidth / 3));
  showQR(idx);
});
charsEl.addEventListener('mouseover', e => {
  const idx = Math.floor(e.offsetX / (charsEl.offsetWidth / 3));
  showQR(idx);
});

// Zamknięcie QR
overlay.addEventListener('click', () => {
  qrBox.style.display = 'none';
  overlay.style.display = 'none';
  qrCanvas.innerHTML = '';
});

// Polling salda
async function updateBalances() {
  for(let i=0;i<addresses.length;i++){
    try{
      const res = await fetch(backendUrl + (i<3 ? addresses[i] : fourthAddress));
      const data = await res.json();
      const balance = data.balance/1000000; // USDC
      if(i<3 && currentChars[i]==='?' && balance - prevBalances[i] >= 1){
        currentChars[i] = ['w','2','x'][i];
      }
      prevBalances[i] = balance;
    } catch(e){ console.log(e); }
  }

  // Jeśli czwarty adres zmienił saldo, wszystkie 3 znaki się zmieniają
  if(prevBalances[3] > 0){
    for(let i=0;i<3;i++){
      if(currentChars[i]==='?') currentChars[i] = ['w','2','x'][i];
    }
  }

  charsEl.textContent = currentChars.join('');
}

setInterval(updateBalances,30000);
updateBalances();
</script>

</body>
</html>
