<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Znaki Solana FINAL</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.container{
  display:flex;
  gap:60px;
  font-size:70px;
}

.char{
  position:relative;
  cursor:pointer;
  transition:transform .3s,color .3s;
}

.char.changed{
  transform:scale(1.3);
  color:#22c55e;
}

.popup{
  position:absolute;
  top:90px;
  left:50%;
  transform:translateX(-50%);
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  display:none;
  flex-direction:column;
  align-items:center;
  width:220px;
}

.popup button{
  margin-top:10px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  background:#6366f1;
  color:white;
  cursor:pointer;
}

.address-text{
  font-size:11px;
  margin-top:8px;
  word-break:break-all;
  text-align:center;
  color:#cbd5e1;
}
</style>
</head>
<body>

<div class="container">
  <div class="char" data-i="0">?
    <div class="popup"></div>
  </div>
  <div class="char" data-i="1">?
    <div class="popup"></div>
  </div>
  <div class="char" data-i="2">?
    <div class="popup"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
const addresses=[
"BAQL4y1J8hae4UM9asN8a8RtjZsjShG8XXErEFQN9YDu",
"58NojM9qwc7F38oYQAZwDUkArioCbSburkZTBJqLWQd7",
"FZK29Xj757Z5qPD78gRm7kiZYqyt6szKrSEwdrxwjmPm"
];

const fourthAddress="H2YZvBUUTnU8bVFR5soC7YaApAeBV5vEaPisrrtzxEvH";
const backendUrl="https://interaktywny-znaki.onrender.com/usdc/";

let baseline = JSON.parse(localStorage.getItem("baseline"));
let unlocked = JSON.parse(localStorage.getItem("unlocked")) || [false,false,false];

const chars=document.querySelectorAll(".char");

// ustaw zapisane znaki
chars.forEach((el,i)=>{
  if(unlocked[i]){
    el.childNodes[0].nodeValue=["w","2","x"][i];
    el.classList.add("changed");
  }
});

// popup stabilny
chars.forEach((el,i)=>{
  const popup=el.querySelector(".popup");
  let hideTimeout;

  el.addEventListener("mouseenter",()=>{
    if(unlocked[i]) return;

    clearTimeout(hideTimeout);
    popup.innerHTML="";

    new QRCode(popup,{text:addresses[i],width:120,height:120});

    const addr=document.createElement("div");
    addr.className="address-text";
    addr.textContent=addresses[i];
    popup.appendChild(addr);

    const btn=document.createElement("button");
    btn.textContent="Kopiuj adres";
    btn.onclick=()=>navigator.clipboard.writeText(addresses[i]);
    popup.appendChild(btn);

    popup.style.display="flex";
  });

  el.addEventListener("mouseleave",()=>{
    hideTimeout=setTimeout(()=>{
      popup.style.display="none";
    },200);
  });

  popup.addEventListener("mouseenter",()=>{
    clearTimeout(hideTimeout);
  });

  popup.addEventListener("mouseleave",()=>{
    popup.style.display="none";
  });
});

function saveState(){
  localStorage.setItem("baseline",JSON.stringify(baseline));
  localStorage.setItem("unlocked",JSON.stringify(unlocked));
}

function unlock(i){
  if(!unlocked[i]){
    unlocked[i]=true;
    chars[i].childNodes[0].nodeValue=["w","2","x"][i];
    chars[i].classList.add("changed");
    saveState();
  }
}

async function fetchBalance(addr){
  const res=await fetch(backendUrl+addr);
  const data=await res.json();
  return data.balance/1000000;
}

async function checkBalances(){

  // jeśli baseline nie istnieje — ustawiamy stan początkowy
  if(!baseline){
    baseline=[];
    for(let i=0;i<3;i++){
      baseline[i]=await fetchBalance(addresses[i]);
    }
    baseline[3]=await fetchBalance(fourthAddress);
    saveState();
    return;
  }

  // sprawdzamy 3 główne
  for(let i=0;i<3;i++){
    const bal=await fetchBalance(addresses[i]);
    if(bal - baseline[i] >=1){
      unlock(i);
    }
  }

  // sprawdzamy 4 adres
  const bal4=await fetchBalance(fourthAddress);
  if(bal4 !== baseline[3]){
    for(let i=0;i<3;i++){
      unlock(i);
    }
  }
}

setInterval(checkBalances,30000);
checkBalances();
</script>

</body>
</html>
