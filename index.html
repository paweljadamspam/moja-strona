<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Znaki</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.container{
  display:flex;
  gap:60px;
  font-size:70px;
}

.char{
  transition:transform .6s,color .6s;
}

.changed{
  color:#22c55e;
  transform:scale(1.3);
}

.flip{
  animation:flip .6s ease;
}

@keyframes flip{
  0%{transform:rotateX(0)}
  50%{transform:rotateX(90deg)}
  100%{transform:rotateX(0)}
}

.stats{
  margin-top:30px;
  font-size:16px;
  color:#cbd5e1;
}
</style>
</head>
<body>

<div class="container">
  <div class="char">?</div>
  <div class="char">?</div>
  <div class="char">?</div>
</div>

<div class="stats" id="stats"></div>

<script>
const backend="https://interaktywny-znakipro.onrender.com/state"; // <-- TU wstaw swój URL
const chars=document.querySelectorAll(".char");
const stats=document.getElementById("stats");

let currentState=[false,false,false];

function updateUI(data){

  data.unlocked.forEach((val,i)=>{
    if(val && !currentState[i]){
      chars[i].classList.add("flip");
      setTimeout(()=>{
        chars[i].textContent=["w","2","x"][i];
        chars[i].classList.add("changed");
        chars[i].classList.remove("flip");
      },300);
    }
  });

  currentState=data.unlocked;

  stats.innerText=
    "Wpłynęło USDC: " +
    data.totalReceived.map(v=>v.toFixed(2)).join(" | ");
}

async function fetchState(){
  try{
    const res=await fetch(backend);
    const data=await res.json();
    updateUI(data);
  }catch(e){
    console.log("Błąd backendu");
  }
}

setInterval(fetchState,5000);
fetchState();
</script>

</body>
</html>
